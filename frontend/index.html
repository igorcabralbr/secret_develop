<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secret Develop - AI Brain</title>

    <!-- Mantém seu style.css -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonte opcional (melhora estética sem quebrar nada) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 16px;
            background: #020617;
            border-bottom: 1px solid #1e293b;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 12px 14px;
            border-radius: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .user {
            align-self: flex-end;
            background: #2563eb;
        }

        .bot {
            align-self: flex-start;
            background: #1e293b;
        }

        .loading {
            opacity: 0.6;
            font-style: italic;
        }

        .input-area {
            display: flex;
            padding: 16px;
            border-top: 1px solid #1e293b;
            background: #020617;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #1e293b;
            color: white;
        }

        #send-btn {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        #send-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="app-container">

        <!-- HEADER -->
        <div class="header">
            🧠 Secret Develop - Financial Brain
        </div>

        <!-- CHAT -->
        <div id="chat-container">
            <!-- mensagens aparecem aqui -->
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input 
                id="user-input" 
                type="text" 
                placeholder="Ask something about finance..."
                autocomplete="off"
            />
            <button id="send-btn">Send</button>
        </div>

    </div>

    <!-- SCRIPT -->
    <script src="app.js"></script>
</body>
</html>
